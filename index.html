<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Form - Step 1</title>

<style>
body {
  background-color: #0b1d5f;
  color: #fff;
  font-family: Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  margin:0;
  padding:20px;
}

h1 { text-align:center; }

form {
  width:100%;
  max-width:500px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

label {
  font-size:14px;
  margin-bottom:5px;
}

input, textarea {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:2px solid #1e3a8a;
  background:#1e3a8a;
  color:#fff;
}

button {
  background:#1e40af;
  color:#fff;
  border:none;
  padding:14px;
  border-radius:8px;
  cursor:pointer;
}

button:hover {
  background:#3b82f6;
}
</style>
</head>

<body>

<h1>Submit Your Complaint</h1>

<form id="complaintForm">

  <div>
    <label>Email Address</label>
    <input type="email" id="email" required placeholder="example@gmail.com">
  </div>

  <div>
    <label>WhatsApp Number</label>
    <input type="text" id="whatsapp" required placeholder="+234XXXXXXXXXX" pattern="[0-9+]{7,15}">
  </div>

  <div>
    <label>Country</label>
    <input type="text" id="country" required placeholder="e.g Cannada">
  </div>

  <div>
    <label>Describe Your Complaint</label>
    <textarea id="complaintText" rows="4" required placeholder="Explain your issue clearly..."></textarea>
  </div>

  <button type="submit">Continue</button>

</form>

<script>
document.getElementById('complaintForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const data = {
    email: document.getElementById('email').value.trim(),
    whatsapp: document.getElementById('whatsapp').value.trim(),
    country: document.getElementById('country').value.trim(),
    complaint: document.getElementById('complaintText').value.trim()
  };

  localStorage.setItem("formStep1", JSON.stringify(data));

  window.location.href = "verify.html";
});
</script>

</body>
</html>
